<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Nutrition Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ecff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #666;
            font-size: 1em;
        }

        #fileInput {
            display: none;
        }

        #foodImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .food-name {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .nutrition-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .nutrition-value {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .nutrition-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .nutrition-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Food Nutrition Scanner</h1>
        <p class="subtitle">Upload a food picture to get instant calories & protein info</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Drop your food photo here</div>
            <div class="upload-subtext">or click to browse</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <img id="foodImage" alt="Food image">
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing your food... 🍔</p>
        </div>
        
        <div class="results" id="results">
            <div class="food-name" id="foodName">Delicious Burger</div>
            <div class="nutrition-grid">
                <div class="nutrition-item">
                    <span class="nutrition-value" id="calories">650</span>
                    <span class="nutrition-label">Calories</span>
                </div>
                <div class="nutrition-item">
                    <span class="nutrition-value" id="protein">35g</span>
                    <span class="nutrition-label">Protein</span>
                </div>
            </div>
        </div>
        
        <div class="error" id="error"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const foodImage = document.getElementById('foodImage');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const error = document.getElementById('error');
        const foodName = document.getElementById('foodName');
        const calories = document.getElementById('calories');
        const protein = document.getElementById('protein');

        // Food database with calories and protein per serving
        const foodDatabase = {
            'pizza': { name: 'Pizza Slice', calories: 285, protein: 12 },
            'burger': { name: 'Beef Burger', calories: 650, protein: 35 },
            'chicken': { name: 'Grilled Chicken', calories: 165, protein: 31 },
            'salad': { name: 'Garden Salad', calories: 150, protein: 6 },
            'sushi': { name: 'Sushi Roll', calories: 200, protein: 9 },
            'pasta': { name: 'Pasta Dish', calories: 400, protein: 15 },
            'sandwich': { name: 'Sandwich', calories: 350, protein: 18 },
            'steak': { name: 'Steak', calories: 550, protein: 45 },
            'salmon': { name: 'Salmon Fillet', calories: 206, protein: 22 },
            'apple': { name: 'Apple', calories: 52, protein: 0.3 },
            'banana': { name: 'Banana', calories: 89, protein: 1.1 },
            'orange': { name: 'Orange', calories: 47, protein: 0.9 },
            'eggs': { name: 'Fried Eggs', calories: 155, protein: 13 },
            'fries': { name: 'French Fries', calories: 312, protein: 3.4 },
            'ice cream': { name: 'Ice Cream', calories: 207, protein: 3.5 },
            'cake': { name: 'Cake Slice', calories: 350, protein: 4 },
            'bread': { name: 'Bread Slice', calories: 79, protein: 3 },
            'rice': { name: 'Cooked Rice', calories: 130, protein: 2.7 },
            'soup': { name: 'Chicken Soup', calories: 120, protein: 8 },
            'yogurt': { name: 'Greek Yogurt', calories: 100, protein: 10 }
        };

        // Simple image recognition using pixel colors (demo purposes)
        function analyzeImage(image) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = image.width;
                canvas.height = image.height;
                ctx.drawImage(image, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                
                // Analyze dominant colors and patterns
                let red = 0, green = 0, blue = 0, total = 0;
                
                for (let i = 0; i < pixels.length; i += 4) {
                    red += pixels[i];
                    green += pixels[i + 1];
                    blue += pixels[i + 2];
                    total++;
                }
                
                const avgRed = red / total;
                const avgGreen = green / total;
                const avgBlue = blue / total;
                
                // Simple color-based food recognition
                if (avgRed > 180 && avgGreen < 100 && avgBlue < 100) {
                    resolve('burger');
                } else if (avgRed > 150 && avgGreen > 150 && avgBlue < 100) {
                    resolve('pizza');
                } else if (avgRed > 100 && avgGreen > 150 && avgBlue > 100) {
                    resolve('salad');
                } else if (avgRed < 100 && avgGreen > 150 && avgBlue < 100) {
                    resolve('chicken');
                } else if (avgRed < 120 && avgGreen < 120 && avgBlue > 150) {
                    resolve('sushi');
                } else {
                    // Fallback to random food for demo
                    const foods = Object.keys(foodDatabase);
                    resolve(foods[Math.floor(Math.random() * foods.length)]);
                }
            });
        }

        // Event listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please upload an image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                foodImage.src = e.target.result;
                foodImage.style.display = 'block';
                
                setTimeout(() => {
                    processImage();
                }, 500);
            };
            reader.readAsDataURL(file);
        }

        async function processImage() {
            loading.style.display = 'block';
            results.style.display = 'none';
            error.style.display = 'none';
            
            try {
                const foodType = await analyzeImage(foodImage);
                const food = foodDatabase[foodType];
                
                foodName.textContent = food.name;
                calories.textContent = food.calories;
                protein.textContent = food.protein + 'g';
                
                loading.style.display = 'none';
                results.style.display = 'block';
            } catch (err) {
                showError('Could not analyze the image. Please try another photo.');
            }
        }

        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
